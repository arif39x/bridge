name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  rust:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          components: clippy, rustfmt

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Clippy
        run: cargo clippy --all-targets --all-features -- -D warnings

      - name: Build
        run: cargo build --all-features

      - name: Test
        run: cargo test --all-features

  python:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.9", "3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - uses: actions-rust-lang/setup-rust-toolchain@v1

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install maturin
        run: pip install maturin

      - name: Build Rust extension
        run: maturin develop

      - name: Install dev dependencies
        run: pip install ".[dev]"

      - name: Ruff lint
        run: ruff check bridge/ tests/

      - name: MyPy
        run: mypy bridge/ tests/

      - name: Pytest (unit)
        run: pytest tests/python/unit/ -v

      - name: Pytest (integration - SQLite)
        run: pytest tests/python/integration/ -v --ignore=tests/python/integration/test_benchmarks.py
        env:
          DATABASE_URL: sqlite::memory:

  benchmarks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions-rust-lang/setup-rust-toolchain@v1

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install maturin
        run: pip install maturin

      - name: Build Rust extension
        run: maturin develop

      - name: Install dev dependencies
        run: pip install ".[dev]"

      - name: Rust benchmarks
        run: cargo bench --all-features

      - name: Python benchmarks (smoke test)
        run: pytest tests/python/integration/test_benchmarks.py -v --benchmark-disable
        env:
          DATABASE_URL: sqlite::memory:
